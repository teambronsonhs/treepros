<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Tree Pros - Tree Surgery Essex & Suffolk</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Tree Pros for expert tree surgery services in Essex and Suffolk.">
    <link rel="canonical" href="https://treepros.co.uk/">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c10 0%, #1a1e2a 100%);
            color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
            background: rgba(20, 25, 35, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 3rem 2rem;
            border: 1px solid rgba(46, 204, 113, 0.3);
            box-shadow: 0 25px 45px -12px black;
        }
        .tree-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2ecc71, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        p {
            color: #aaa;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #2ecc71;
            color: #0a0c10;
            padding: 1rem 2rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s;
            margin: 0.5rem;
        }
        .btn:hover {
            background: white;
            transform: translateY(-3px);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #2ecc71;
            color: #2ecc71;
        }
        .btn-outline:hover {
            background: #2ecc71;
            color: #0a0c10;
        }
        .search-box {
            margin: 2rem 0;
        }
        .search-input {
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: none;
            width: 70%;
            background: #1e2229;
            color: white;
            outline: none;
        }
        @media (max-width: 600px) {
            h1 { font-size: 4rem; }
            h2 { font-size: 1.4rem; }
            .btn { display: block; margin: 0.5rem auto; width: 80%; }
            .search-input { width: 100%; margin-bottom: 1rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">

        Maybe it was a tree that fell over? 🌲</p>
        
        <a href="https://treepros.co.uk/" class="btn">🏠 Return to Homepage</a>
        <a href="https://treepros.co.uk/#contact" class="btn btn-outline">📞 Get a Free Quote</a>
        
        <div class="search-box">
            <p style="font-size: 0.8rem; margin-bottom: 0.5rem;">Need tree surgery in Essex or Suffolk?</p>
            <a href="https://treepros.co.uk/#services" class="btn-outline" style="display: inline-block; padding: 0.6rem 1.2rem; border-radius: 60px; text-decoration: none; border: 1px solid #2ecc71; color: #2ecc71;">View Our Services →</a>
        </div>
    </div>

    <!-- Auto-redirect to homepage after 5 seconds (optional) -->
    <script>
        setTimeout(function() {
            window.location.href = 'https://treepros.co.uk/';
        }, 5000);
    </script>
</body>
</html>
